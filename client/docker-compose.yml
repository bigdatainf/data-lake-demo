services:
  jupyter:
    image:  jupyter/minimal-notebook
    container_name: jupyter
    ports:
      - "8888:8888"
    command: ["start-notebook.sh",
              "--NotebookApp.token=''",
              "--NotebookApp.password=''"]
    networks:
      - datalake-network
    environment:
      - JUPYTER_ENABLE_LAB=yes

networks:
  datalake-network:
    external: true